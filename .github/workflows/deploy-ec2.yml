name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject .env from secret (optional)
        env:
          EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE }}
        run: |
          if [ -n "$EC2_ENV_FILE" ]; then
            printf "%s" "$EC2_ENV_FILE" > .env
          else
            echo "No EC2_ENV_FILE secret supplied; preserving any .env already on EC2."
          fi

      - name: Configure SSH key
        env:
          EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "$EC2_KNOWN_HOSTS" ]; then
            echo "ERROR: Set the EC2_KNOWN_HOSTS secret to the server's SSH host key."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Use a fixed alias for the trusted key so it remains valid whether
          # EC2_HOST contains the instance IP address or its public DNS name.
          printf "%s\n" "$EC2_KNOWN_HOSTS" | awk 'NF >= 3 { $1 = "ec2-deploy-host"; print }' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Package release archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='artifacts' \
            -czf /tmp/release.tar.gz .

      - name: Upload archive to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
        run: |
          set -euo pipefail
          PORT="${EC2_PORT:-22}"
          HOST="${EC2_HOST_STATIC:-$EC2_HOST}"
          echo "Uploading archive to ${EC2_USER}@${HOST}:${PORT}"
          if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}"; then
            echo "ERROR: Cannot reach ${HOST}:${PORT} from GitHub runner."
            echo "Check EC2 Security Group/NACL/route table and SSH service."
            exit 1
          fi

          for attempt in 1 2 3; do
            if scp -P "$PORT" \
              -o StrictHostKeyChecking=yes \
              -o HostKeyAlias=ec2-deploy-host \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              -o ConnectTimeout=30 \
              /tmp/release.tar.gz "${EC2_USER}@${HOST}:/tmp/customer_support_agent_release.tar.gz"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "ERROR: scp failed after ${attempt} attempts."
              exit 1
            fi
            echo "scp attempt ${attempt} failed, retrying..."
            sleep $((attempt * 5))
          done

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          set -euo pipefail
          PORT="${EC2_PORT:-22}"
          HOST="${EC2_HOST_STATIC:-$EC2_HOST}"
          APP_DIR="${EC2_APP_DIR:-/opt/customer_support_agent}"

          echo "Deploying to ${EC2_USER}@${HOST}:${PORT}"
          if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}"; then
            echo "ERROR: Cannot reach ${HOST}:${PORT} from GitHub runner."
            echo "Check EC2 Security Group/NACL/route table and SSH service."
            exit 1
          fi

          for deploy_attempt in 1 2 3; do
            if ssh -p "$PORT" \
              -o StrictHostKeyChecking=yes \
              -o HostKeyAlias=ec2-deploy-host \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              -o ConnectTimeout=30 \
              "${EC2_USER}@${HOST}" \
              "APP_DIR='${APP_DIR}' bash -s" <<'EOF_REMOTE'; then
          set -euo pipefail

          if ! mkdir -p "$APP_DIR" 2>/dev/null; then
            APP_DIR="$HOME/customer_support_agent"
            mkdir -p "$APP_DIR"
            echo "APP_DIR not writable, using fallback: $APP_DIR"
          fi

          tar -xzf /tmp/customer_support_agent_release.tar.gz -C "$APP_DIR"

          cd "$APP_DIR"

          if [ ! -f .env ]; then
            echo "ERROR: .env missing in $APP_DIR"
            echo "Create it once on server or set EC2_ENV_FILE secret."
            exit 1
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not found. Installing Docker Engine from Docker's apt repository..."
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl
              sudo install -m 0755 -d /etc/apt/keyrings
              sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              sudo chmod a+r /etc/apt/keyrings/docker.asc
              sudo tee /etc/apt/sources.list.d/docker.sources >/dev/null <<EOF_DOCKER_REPOSITORY
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF_DOCKER_REPOSITORY
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            else
              echo "ERROR: Unsupported package manager; install Docker manually."
              exit 1
            fi
          fi

          sudo systemctl enable --now docker || true

          echo "Ensuring the root filesystem uses the resized EBS volume..."
          ROOT_FILESYSTEM=$(findmnt -n -o FSTYPE /)
          # `findmnt` may report /dev/root on EC2. Ask lsblk for the actual
          # block device mounted at / so growpart receives one partition number.
          ROOT_DEVICE=$(lsblk -nrpo NAME,MOUNTPOINTS | awk '$2 == "/" { print $1; exit }')
          ROOT_DISK=$(lsblk -no PKNAME "$ROOT_DEVICE" | tr -d '[:space:]')
          ROOT_PARTITION=$(lsblk -no PARTN "$ROOT_DEVICE" | tr -d '[:space:]')
          if [ -z "$ROOT_DISK" ] || [ -z "$ROOT_PARTITION" ]; then
            echo "ERROR: Could not identify the root disk and partition."
            findmnt /
            lsblk
            exit 1
          fi
          echo "Root block device: $ROOT_DEVICE (disk: /dev/$ROOT_DISK, partition: $ROOT_PARTITION)"
          if ! command -v growpart >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y cloud-guest-utils
          fi
          sudo growpart "/dev/$ROOT_DISK" "$ROOT_PARTITION"
          case "$ROOT_FILESYSTEM" in
            ext4) sudo resize2fs "$ROOT_DEVICE" ;;
            xfs) sudo xfs_growfs -d / ;;
            *)
              echo "ERROR: Unsupported root filesystem: $ROOT_FILESYSTEM"
              exit 1
              ;;
          esac
          df -hT /

          if sudo docker compose version >/dev/null 2>&1; then
            DOCKER_COMPOSE_CMD="sudo docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            DOCKER_COMPOSE_CMD="sudo docker-compose"
          else
            echo "ERROR: Docker Compose is not available."
            exit 1
          fi

          echo "Reclaiming disk space before build..."
          df -h / /var/lib/docker 2>/dev/null || df -h /
          sudo docker system df || true
          $DOCKER_COMPOSE_CMD down --remove-orphans || true
          # The prior application image is no longer needed after `down` and is
          # large enough to prevent the replacement image from being exported
          # on small EC2 root volumes.
          sudo docker image rm -f support-copilot:latest || true
          sudo docker builder prune -af || true
          sudo docker container prune -f || true
          sudo docker system df || true
          AVAILABLE_KB=$(df -Pk /var/lib/docker 2>/dev/null | awk 'NR == 2 { print $4 }')
          if [ -z "$AVAILABLE_KB" ]; then
            AVAILABLE_KB=$(df -Pk / | awk 'NR == 2 { print $4 }')
          fi
          # Building this dependency set temporarily needs both the builder and
          # runtime layers, so fail early with an actionable message instead of
          # an opaque containerd "no space left on device" error.
          if [ "$AVAILABLE_KB" -lt 12582912 ]; then
            echo "ERROR: Less than 12 GiB is free for Docker after cleanup."
            echo "Expand the EC2 root filesystem, or remove unused data/logs on the host."
            df -h / /var/lib/docker 2>/dev/null || df -h /
            exit 1
          fi

          $DOCKER_COMPOSE_CMD up -d --build --force-recreate --remove-orphans
          $DOCKER_COMPOSE_CMD ps
          HEALTH_URL="http://127.0.0.1:8000/health"
          HEALTH_WAIT_SECONDS=60
          HEALTH_INTERVAL_SECONDS=2
          MAX_ATTEMPTS=$((HEALTH_WAIT_SECONDS / HEALTH_INTERVAL_SECONDS))

          echo "Waiting for API health endpoint: $HEALTH_URL"
          for health_attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if curl -fsS --max-time 3 "$HEALTH_URL" >/dev/null; then
              echo "API healthy (attempt $health_attempt/$MAX_ATTEMPTS)"
              break
            fi

            if [ "$health_attempt" -eq "$MAX_ATTEMPTS" ]; then
              echo "ERROR: API health check failed after ${HEALTH_WAIT_SECONDS}s"
              $DOCKER_COMPOSE_CMD ps
              $DOCKER_COMPOSE_CMD logs --tail=200 api
              exit 1
            fi

            sleep "$HEALTH_INTERVAL_SECONDS"
          done

          curl -fsS "$HEALTH_URL"
          rm -f /tmp/customer_support_agent_release.tar.gz
          EOF_REMOTE
              break
            fi
            if [ "$deploy_attempt" -eq 3 ]; then
              echo "ERROR: ssh deploy failed after ${deploy_attempt} attempts."
              exit 1
            fi
            echo "ssh attempt ${deploy_attempt} failed, retrying..."
            sleep $((deploy_attempt * 5))
          done
